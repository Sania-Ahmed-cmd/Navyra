<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navyra</title>
<script src="https://cdn.tailwindcss.com"></script>

<script>
if(localStorage.getItem("auth") !== "true"){
    window.location.href = "login.html";
}
</script>

<style>
body { background:#0b0f19; }
.card { background:#111827; border-radius:12px; }
th, td { padding: 10px; text-align: left; }
</style>
</head>

<body class="flex text-white">

<!-- SIDEBAR (same structure) -->
<aside class="w-64 bg-[#0b0f19] p-5 border-r border-gray-800">
<h2 class="mb-6">Navyra</h2>

<nav class="space-y-3">

<a href="index.html" class="text-gray-400">Dashboard</a>

<div>
<div class="bg-gray-800 px-3 py-2 rounded">Fleet</div>

<div class="ml-3 mt-3 space-y-2 flex flex-col">
<a href="fleet.html" class="text-gray-400">Overview</a>
<a href="maintenance.html" class="text-gray-400"> Maintenance</a>
<a href="fuel.html" class="text-white font-medium"> Fuel</a>
</div>
</div>

<a href="inventory.html" class="text-gray-400">Inventory</a>

</nav>
</aside>

<!-- MAIN -->
<main class="flex-1 p-6">

<h1 class="text-2xl mb-6">Fuel Monitoring</h1>

<div class="card p-4">
<table class="w-full border-collapse">
<thead class="border-b border-gray-700 text-gray-400">
<tr>
<th>Ship</th>
<th>Fuel Level</th>
<th>Status</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>
</div>

</main>

<script src="data.js"></script>

<script>
ships.forEach(s=>{
let fuel = s.fuel;

let status, color;

if(fuel < 25){
status="Critical"; color="text-red-400";
}
else if(fuel < 60){
status="Low"; color="text-yellow-400";
}
else{
status="Optimal"; color="text-green-400";
}

const row=document.createElement("tr");

row.innerHTML=`
<td>${s.name}</td>
<td>${fuel.toFixed(0)}%</td>
<td class="${color}">${status}</td>
`;

table.appendChild(row);
});
</script>

</body>
</html>
